apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fastapi-ingress
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:

      # API FIRST (important)
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: fastapi-backend-service
            port:
              number: 8000

      # Frontend (handles / and /static automatically)
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80