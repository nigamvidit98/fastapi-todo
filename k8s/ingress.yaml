apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fastapi-ingress
spec:
  ingressClassName: nginx

  tls:
  - hosts:
      - todo.local
    secretName: todo-tls

  rules:
  - host: todo.local
    http:
      paths:

      - path: /api
        pathType: Prefix
        backend:
          service:
            name: fastapi-backend-service
            port:
              number: 8000

      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80